# ═══════════════════════════════════════════════════════════════════════════
# 🔬 SONARQUBE CONFIGURATION - FRONTEND
# ═══════════════════════════════════════════════════════════════════════════

# Project Information
sonar.projectKey=frontend
sonar.projectName=Frontend React
sonar.projectVersion=1.0

# Source Code
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.tsx,**/*.spec.ts

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,public/**,**/*.config.*,**/main.tsx,**/*.d.ts
sonar.coverage.exclusions=**/*.config.*,**/main.tsx,**/*.d.ts,**/*.test.*,**/*.spec.*

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Analysis Parameters
sonar.scm.provider=git